<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ title }} | Tanvir Hussain</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-page: #fcfcfd;
            --accent: #8e44ad;
            --text-primary: #0f172a;
            --text-secondary: #475569;
            --border: #e2e8f0;
            --font-main: 'Inter', sans-serif;
            --font-mono: 'JetBrains Mono', monospace;
        }

        body {
            background-color: var(--bg-page);
            color: var(--text-primary);
            font-family: var(--font-main);
            margin: 0;
            padding: 0;
            line-height: 1.7;
            -webkit-font-smoothing: antialiased;
        }

        .container {
            max-width: 750px;
            margin: 0 auto;
            padding: 4rem 1.5rem;
        }

        header {
            margin-bottom: 4rem;
            border-bottom: 1px solid var(--border);
            padding-bottom: 2rem;
        }

        .back-link {
            font-family: var(--font-mono);
            font-size: 0.85rem;
            text-decoration: none;
            color: var(--accent);
            font-weight: 700;
            display: inline-block;
            margin-bottom: 2rem;
        }

        h1 {
            font-family: var(--font-mono);
            font-size: 2.5rem;
            margin: 0;
            font-weight: 700;
            letter-spacing: -1px;
        }

        .post-date {
            font-family: var(--font-mono);
            font-size: 0.9rem;
            color: var(--text-secondary);
            margin-top: 1rem;
        }

        main {
            font-size: 1.15rem;
            color: var(--text-secondary);
        }

        main h2 {
            font-family: var(--font-mono);
            color: var(--text-primary);
            margin-top: 3rem;
            font-size: 1.5rem;
        }

        main pre {
            background: #f1f5f9;
            padding: 1.5rem;
            border-radius: 8px;
            overflow-x: auto;
            font-family: var(--font-mono);
            font-size: 0.95rem;
            border: 1px solid var(--border);
        }

        main code {
            font-family: var(--font-mono);
            background: #f1f5f9;
            padding: 2px 6px;
            border-radius: 4px;
            font-size: 0.9em;
        }

        footer {
            margin-top: 6rem;
            padding-top: 2rem;
            border-top: 1px solid var(--border);
            text-align: center;
            font-family: var(--font-mono);
            font-size: 0.8rem;
            color: #94a3b8;
        }
    </style>
</head>
<body>

    <div class="container">
        <a href="https://shadowpbx.github.io/Tutorials/" class="back-link">[ &larr; BACK TO TUTORIALS ]</a>
        
        <header>
            <h1>{{ title }}</h1>
            <p class="post-date">PUBLISHED // {{ date }}</p>
        </header>

        <main>
            {{ content }}
        </main>

        <footer>
            &copy; 2026 // TANVIR HUSSAIN // SYSTEMS ARCHITECT
        </footer>
    </div>

</body>
</html>
